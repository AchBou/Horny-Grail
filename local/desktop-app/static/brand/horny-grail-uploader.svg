<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">The Horny Grail uploader logo</title>
  <desc id="desc">A gold grail with photo cards and an upload arrow on a blue desktop badge.</desc>
  <defs>
    <linearGradient id="hg-uploader-bg" x1="48" x2="458" y1="44" y2="484" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dbeafe" />
      <stop offset="0.5" stop-color="#eff6ff" />
      <stop offset="1" stop-color="#c7d2fe" />
    </linearGradient>
    <radialGradient id="hg-uploader-halo" cx="257" cy="214" r="205" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.25" />
      <stop offset="0.55" stop-color="#0f766e" stop-opacity="0.14" />
