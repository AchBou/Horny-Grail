AWSTemplateFormatVersion: 2010-09-09
Description: >-
  horny-grail-app
Transform:
- AWS::Serverless-2016-10-31

Parameters:
  LookupTableName:
    Type: String
    Description: Name of the DynamoDB table managed by this stack
    Default: horny-grail-name-lookup
  CloudFrontBaseUrl:
    Type: String
    Description: CloudFront base URL used to build public image URLs
    Default: https://dqvs0hmo3wpp7.cloudfront.net
  BucketName:
    Type: String
    Description: Existing S3 bucket used for full images and thumbnails
    Default: my-awesome-very-secret-upload-bucket
  BucketRegion:
    Type: String
    Description: AWS region of the existing S3 bucket used for uploads
    Default: us-west-2
  WriteApiKey:
    Type: String
    Description: Shared API key required for write endpoints
    NoEcho: true
  AllowedCorsOrigins:
    Type: String
    Description: Comma-separated list of allowed CORS origins
    Default: http://localhost:5173,http://localhost:1420

# Resources declares the AWS resources that you want to include in the stack
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/resources-section-structure.html
Resources:
  LookupTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref LookupTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      - AttributeName: status
        AttributeType: S
      - AttributeName: randomKey
        AttributeType: N
      KeySchema:
      - AttributeName: id
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: RandomImageIndex
        KeySchema:
        - AttributeName: status
          KeyType: HASH
        - AttributeName: randomKey
          KeyType: RANGE
        Projection:
          ProjectionType: ALL

  # Each Lambda function is defined by properties:
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction

  # This is a Lambda function config associated with the source code: get-all-items.js
  getAllThumbnailsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/thumbnails/get-all-thumbnails.getAllThumbnailsHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 100
      Description: A simple example includes a HTTP get method to get all items 
        from a DynamoDB table.
      Policies:
      - DynamoDBReadPolicy:
          TableName: !Ref LookupTable
      Environment:
        Variables:
          # Make table name accessible as environment variable from function code during execution
          LOOKUP_TABLE: !Ref LookupTable
          CORS_ALLOWED_ORIGINS: !Ref AllowedCorsOrigins
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api/thumbnails
            Method: GET
  # Each Lambda function is defined by properties:
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction

  # This is a Lambda function config associated with the source code: get-by-id.js
  getByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-by-id.getByIdHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 100
      Description: A simple example includes a HTTP get method to get one item 
        by id from a DynamoDB table.
      Policies:
      - DynamoDBReadPolicy:
          TableName: !Ref LookupTable
      Environment:
        Variables:
          # Make table name accessible as environment variable from function code during execution
          LOOKUP_TABLE: !Ref LookupTable
          CORS_ALLOWED_ORIGINS: !Ref AllowedCorsOrigins
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api/{id}
            Method: GET
  # Each Lambda function is defined by properties:
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction

  # This is a Lambda function config associated with the source code: put-item.js
  putItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/put-item.putItemHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 100
      Description: A simple example includes a HTTP post method to add one item 
        to a DynamoDB table.
      Policies:
      - DynamoDBWritePolicy:
          TableName: !Ref LookupTable
      Environment:
        Variables:
          # Make table name accessible as environment variable from function code during execution
          LOOKUP_TABLE: !Ref LookupTable
          BUCKET_NAME: !Ref BucketName
          WRITE_API_KEY: !Ref WriteApiKey
          CORS_ALLOWED_ORIGINS: !Ref AllowedCorsOrigins
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api
            Method: POST
        ApiOptions:
          Type: HttpApi
          Properties:
            Path: /api
            Method: OPTIONS

  getAllItemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-all-items.getAllItemsHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 100
      Description: A simple example includes a HTTP get method to get all items 
        from a DynamoDB table.
      Policies:
      - DynamoDBReadPolicy:
          TableName: !Ref LookupTable
      Environment:
        Variables:
          LOOKUP_TABLE: !Ref LookupTable
          CLOUDFRONT_BASE_URL: !Ref CloudFrontBaseUrl
          CORS_ALLOWED_ORIGINS: !Ref AllowedCorsOrigins
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api
            Method: GET
        ApiTrailingSlash:
          Type: HttpApi
          Properties:
            Path: /api/
            Method: GET

  GetRandomImage:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/images/get-random-image.getRandomImageHandler
      Runtime: nodejs22.x
      Timeout: 60
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref LookupTable
        - Statement:
          - Effect: Allow
            Action:
            - dynamodb:Query
            Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${LookupTable}/index/RandomImageIndex
      Environment:
        Variables:
          LOOKUP_TABLE: !Ref LookupTable
          BUCKET_NAME: !Ref BucketName
          BUCKET_REGION: !Ref BucketRegion
          CLOUDFRONT_BASE_URL: !Ref CloudFrontBaseUrl
          CORS_ALLOWED_ORIGINS: !Ref AllowedCorsOrigins
      Architectures:
        - x86_64
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api/get-random-image
            Method: GET

  signUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/uploads/sign-upload.signUploadHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 30
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - s3:PutObject
          Resource:
          - !Sub arn:aws:s3:::${BucketName}/files/*
          - !Sub arn:aws:s3:::${BucketName}/thumbnails/*
      Environment:
        Variables:
          BUCKET_NAME: !Ref BucketName
          BUCKET_REGION: !Ref BucketRegion
          WRITE_API_KEY: !Ref WriteApiKey
          CORS_ALLOWED_ORIGINS: !Ref AllowedCorsOrigins
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api/uploads/sign
            Method: POST
        ApiOptions:
          Type: HttpApi
          Properties:
            Path: /api/uploads/sign
            Method: OPTIONS

  getAssetIntegrityFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/assets/get-asset-integrity.getAssetIntegrityHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 30
      Policies:
      - DynamoDBReadPolicy:
          TableName: !Ref LookupTable
      - Statement:
        - Effect: Allow
          Action:
          - s3:GetObject
          Resource:
          - !Sub arn:aws:s3:::${BucketName}/files/*
          - !Sub arn:aws:s3:::${BucketName}/thumbnails/*
      Environment:
        Variables:
          LOOKUP_TABLE: !Ref LookupTable
          BUCKET_NAME: !Ref BucketName
          BUCKET_REGION: !Ref BucketRegion
          CORS_ALLOWED_ORIGINS: !Ref AllowedCorsOrigins
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api/assets/{id}/integrity
            Method: GET


  ApplicationResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name:
        Fn::Sub: ApplicationInsights-SAM-${AWS::StackName}
      ResourceQuery:
        Type: CLOUDFORMATION_STACK_1_0
  ApplicationInsightsMonitoring:
    Type: AWS::ApplicationInsights::Application
    Properties:
      ResourceGroupName:
        Ref: ApplicationResourceGroup
      AutoConfigurationEnabled: 'true'
Outputs:
  LookupTableName:
    Description: DynamoDB table name used for image metadata
    Value: !Ref LookupTable
  RandomImageIndexName:
    Description: DynamoDB GSI for random active image queries
    Value: RandomImageIndex
  WebEndpoint:
    Description: HTTP API default endpoint URL with /api base path
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/api/"
# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    LoggingConfig:
      LogFormat: JSON
