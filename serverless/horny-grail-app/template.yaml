AWSTemplateFormatVersion: 2010-09-09
Description: >-
  horny-grail-app
Transform:
- AWS::Serverless-2016-10-31

Parameters:
  LookupTableName:
    Type: String
    Description: Name of the DynamoDB table managed by this stack
    Default: horny-grail-name-lookup
  CloudFrontBaseUrl:
    Type: String
    Description: Legacy local/dev asset base URL used when running handlers outside the protected CloudFront stack
    Default: https://your-cloudfront-domain.cloudfront.net
  FrontendOriginDomainName:
    Type: String
    Description: Existing frontend origin domain name, typically the S3 website endpoint serving the static frontend
    Default: your-frontend-bucket.s3-website-us-west-2.amazonaws.com
  MediaOriginDomainName:
    Type: String
    Description: Existing media origin domain name that currently serves /files and /thumbnails
    Default: your-media-origin.cloudfront.net
  BucketName:
    Type: String
    Description: Existing S3 bucket used for full images and thumbnails
    Default: your-upload-bucket-name
  BucketRegion:
    Type: String
    Description: AWS region of the existing S3 bucket used for uploads
    Default: us-west-2
  WriteApiKey:
    Type: String
    Description: Shared API key required for write endpoints
    NoEcho: true
  ReadAccessCode:
    Type: String
    Description: Shared code accepted by the custom access page
    NoEcho: true
  CloudFrontPublicKeyParameterName:
    Type: String
    Description: SSM parameter name containing the PEM encoded RSA public key paired with the private key in Secrets Manager
  CloudFrontPrivateKeySecretArn:
    Type: String
    Description: Secrets Manager secret ARN containing the RSA private key PEM used to sign CloudFront cookies
    NoEcho: true
  AccessCookieTtlSeconds:
    Type: Number
    Description: Number of seconds a successful access-code session remains valid
    Default: 604800
  CloudFrontCookieResource:
    Type: String
    Description: CloudFront signed-cookie resource scope. Use https://*/* for first deploy, then restrict to your protected domain if desired.
    Default: https://*/*
  AllowedCorsOrigins:
    Type: String
    Description: Comma-separated list of allowed CORS origins
    Default: http://localhost:5173,http://localhost:1420

# Resources declares the AWS resources that you want to include in the stack
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/resources-section-structure.html
Resources:
  LookupTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref LookupTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      - AttributeName: status
        AttributeType: S
      - AttributeName: randomKey
        AttributeType: N
      KeySchema:
      - AttributeName: id
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: RandomImageIndex
        KeySchema:
        - AttributeName: status
          KeyType: HASH
        - AttributeName: randomKey
          KeyType: RANGE
        Projection:
          ProjectionType: ALL

  ProtectedReadStaticCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub ${AWS::StackName}-protected-read-static
        DefaultTTL: 86400
        MaxTTL: 31536000
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true

  ProtectedReadApiCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub ${AWS::StackName}-protected-read-api
        DefaultTTL: 0
        MaxTTL: 1
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - Origin
              - Access-Control-Request-Headers
              - Access-Control-Request-Method
              - Content-Type
              - x-api-key
          QueryStringsConfig:
            QueryStringBehavior: all
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true

  ProtectedReadApiOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: !Sub ${AWS::StackName}-protected-read-api
        CookiesConfig:
          CookieBehavior: none
        HeadersConfig:
          HeaderBehavior: whitelist
          Headers:
            - Origin
            - Access-Control-Request-Headers
            - Access-Control-Request-Method
            - Content-Type
            - x-api-key
        QueryStringsConfig:
          QueryStringBehavior: all

  ProtectedReadPublicKey:
    Type: AWS::CloudFront::PublicKey
    Properties:
      PublicKeyConfig:
        CallerReference: !Sub ${AWS::StackName}-protected-read-key
        Comment: Public key used by CloudFront to verify HornyGrail access cookies
        EncodedKey: !Sub '{{resolve:ssm:${CloudFrontPublicKeyParameterName}}}'
        Name: !Sub ${AWS::StackName}-protected-read-key

  ProtectedReadKeyGroup:
    Type: AWS::CloudFront::KeyGroup
    Properties:
      KeyGroupConfig:
        Comment: Key group trusted by the HornyGrail protected read distribution
        Items:
          - !Ref ProtectedReadPublicKey
        Name: !Sub ${AWS::StackName}-protected-read-key-group

  ProtectedReadSiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub Protected static site, API, and media distribution for ${AWS::StackName}
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: PriceClass_100
        DefaultRootObject: index.html
        Origins:
          - Id: FrontendOrigin
            DomainName: !Ref FrontendOriginDomainName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
              OriginSSLProtocols:
                - TLSv1.2
          - Id: ApiOrigin
            DomainName: !Sub ${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
          - Id: MediaOrigin
            DomainName: !Ref MediaOriginDomainName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachePolicyId: !Ref ProtectedReadStaticCachePolicy
          Compress: true
          TargetOriginId: FrontendOrigin
          TrustedKeyGroups:
            - !Ref ProtectedReadKeyGroup
          ViewerProtocolPolicy: redirect-to-https
        CacheBehaviors:
          - PathPattern: /_app/*
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachePolicyId: !Ref ProtectedReadStaticCachePolicy
            Compress: true
            TargetOriginId: FrontendOrigin
            ViewerProtocolPolicy: redirect-to-https
          - PathPattern: /access*
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachePolicyId: !Ref ProtectedReadStaticCachePolicy
            Compress: true
            TargetOriginId: FrontendOrigin
            ViewerProtocolPolicy: redirect-to-https
          - PathPattern: /auth/*
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - PATCH
              - POST
              - DELETE
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachePolicyId: !Ref ProtectedReadApiCachePolicy
            Compress: true
            OriginRequestPolicyId: !Ref ProtectedReadApiOriginRequestPolicy
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
          - PathPattern: /api/*
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - PATCH
              - POST
              - DELETE
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachePolicyId: !Ref ProtectedReadApiCachePolicy
            Compress: true
            OriginRequestPolicyId: !Ref ProtectedReadApiOriginRequestPolicy
            TargetOriginId: ApiOrigin
            TrustedKeyGroups:
              - !Ref ProtectedReadKeyGroup
            ViewerProtocolPolicy: redirect-to-https
          - PathPattern: /files/*
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachePolicyId: !Ref ProtectedReadStaticCachePolicy
            Compress: true
            TargetOriginId: MediaOrigin
            TrustedKeyGroups:
              - !Ref ProtectedReadKeyGroup
            ViewerProtocolPolicy: redirect-to-https
          - PathPattern: /thumbnails/*
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachePolicyId: !Ref ProtectedReadStaticCachePolicy
            Compress: true
            TargetOriginId: MediaOrigin
            TrustedKeyGroups:
              - !Ref ProtectedReadKeyGroup
            ViewerProtocolPolicy: redirect-to-https
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /access
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /200.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  createAccessSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/auth/create-session.createSessionHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Validates the shared access code and issues CloudFront signed cookies.
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - secretsmanager:GetSecretValue
          Resource: !Ref CloudFrontPrivateKeySecretArn
      Environment:
        Variables:
          READ_ACCESS_CODE: !Ref ReadAccessCode
          CLOUDFRONT_PRIVATE_KEY_SECRET_ARN: !Ref CloudFrontPrivateKeySecretArn
          CLOUDFRONT_KEY_PAIR_ID: !Ref ProtectedReadPublicKey
          CLOUDFRONT_COOKIE_RESOURCE: !Ref CloudFrontCookieResource
          ACCESS_COOKIE_TTL_SECONDS: !Ref AccessCookieTtlSeconds
      Events:
        AuthSessionPost:
          Type: HttpApi
          Properties:
            Path: /auth/session
            Method: POST
        AuthSessionGet:
          Type: HttpApi
          Properties:
            Path: /auth/session
            Method: GET
        AuthSessionOptions:
          Type: HttpApi
          Properties:
            Path: /auth/session
            Method: OPTIONS

  # Each Lambda function is defined by properties:
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction

  # This is a Lambda function config associated with the source code: get-all-items.js
  getAllThumbnailsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/thumbnails/get-all-thumbnails.getAllThumbnailsHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 100
      Description: A simple example includes a HTTP get method to get all items 
        from a DynamoDB table.
      Policies:
      - DynamoDBReadPolicy:
          TableName: !Ref LookupTable
      Environment:
        Variables:
          # Make table name accessible as environment variable from function code during execution
          LOOKUP_TABLE: !Ref LookupTable
          CORS_ALLOWED_ORIGINS: !Ref AllowedCorsOrigins
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api/thumbnails
            Method: GET
  # Each Lambda function is defined by properties:
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction

  # This is a Lambda function config associated with the source code: get-by-id.js
  getByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-by-id.getByIdHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 100
      Description: A simple example includes a HTTP get method to get one item 
        by id from a DynamoDB table.
      Policies:
      - DynamoDBReadPolicy:
          TableName: !Ref LookupTable
      Environment:
        Variables:
          # Make table name accessible as environment variable from function code during execution
          LOOKUP_TABLE: !Ref LookupTable
          CORS_ALLOWED_ORIGINS: !Ref AllowedCorsOrigins
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api/{id}
            Method: GET
  # Each Lambda function is defined by properties:
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction

  # This is a Lambda function config associated with the source code: put-item.js
  putItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/put-item.putItemHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 100
      Description: A simple example includes a HTTP post method to add one item 
        to a DynamoDB table.
      Policies:
      - DynamoDBWritePolicy:
          TableName: !Ref LookupTable
      Environment:
        Variables:
          # Make table name accessible as environment variable from function code during execution
          LOOKUP_TABLE: !Ref LookupTable
          BUCKET_NAME: !Ref BucketName
          WRITE_API_KEY: !Ref WriteApiKey
          CORS_ALLOWED_ORIGINS: !Ref AllowedCorsOrigins
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api
            Method: POST
        ApiOptions:
          Type: HttpApi
          Properties:
            Path: /api
            Method: OPTIONS

  getAllItemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-all-items.getAllItemsHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 100
      Description: A simple example includes a HTTP get method to get all items 
        from a DynamoDB table.
      Policies:
      - DynamoDBReadPolicy:
          TableName: !Ref LookupTable
      Environment:
        Variables:
          LOOKUP_TABLE: !Ref LookupTable
          CLOUDFRONT_BASE_URL: !Ref CloudFrontBaseUrl
          CORS_ALLOWED_ORIGINS: !Ref AllowedCorsOrigins
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api
            Method: GET
        ApiTrailingSlash:
          Type: HttpApi
          Properties:
            Path: /api/
            Method: GET

  GetRandomImage:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/images/get-random-image.getRandomImageHandler
      Runtime: nodejs22.x
      Timeout: 60
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref LookupTable
        - Statement:
          - Effect: Allow
            Action:
            - dynamodb:Query
            Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${LookupTable}/index/RandomImageIndex
      Environment:
        Variables:
          LOOKUP_TABLE: !Ref LookupTable
          BUCKET_NAME: !Ref BucketName
          BUCKET_REGION: !Ref BucketRegion
          CLOUDFRONT_BASE_URL: !Ref CloudFrontBaseUrl
          CORS_ALLOWED_ORIGINS: !Ref AllowedCorsOrigins
      Architectures:
        - x86_64
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api/get-random-image
            Method: GET

  getRandomBrowseFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/browse/get-random-browse.getRandomBrowseHandler
      Runtime: nodejs22.x
      Timeout: 60
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref LookupTable
        - Statement:
          - Effect: Allow
            Action:
            - dynamodb:Query
            Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${LookupTable}/index/RandomImageIndex
      Environment:
        Variables:
          LOOKUP_TABLE: !Ref LookupTable
          CORS_ALLOWED_ORIGINS: !Ref AllowedCorsOrigins
      Architectures:
        - x86_64
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api/browse/random
            Method: GET

  signUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/uploads/sign-upload.signUploadHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 30
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - s3:PutObject
          Resource:
          - !Sub arn:aws:s3:::${BucketName}/files/*
          - !Sub arn:aws:s3:::${BucketName}/thumbnails/*
      Environment:
        Variables:
          BUCKET_NAME: !Ref BucketName
          BUCKET_REGION: !Ref BucketRegion
          WRITE_API_KEY: !Ref WriteApiKey
          CORS_ALLOWED_ORIGINS: !Ref AllowedCorsOrigins
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api/uploads/sign
            Method: POST
        ApiOptions:
          Type: HttpApi
          Properties:
            Path: /api/uploads/sign
            Method: OPTIONS

  getAssetIntegrityFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/assets/get-asset-integrity.getAssetIntegrityHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 30
      Policies:
      - DynamoDBReadPolicy:
          TableName: !Ref LookupTable
      - Statement:
        - Effect: Allow
          Action:
          - s3:GetObject
          Resource:
          - !Sub arn:aws:s3:::${BucketName}/files/*
          - !Sub arn:aws:s3:::${BucketName}/thumbnails/*
      Environment:
        Variables:
          LOOKUP_TABLE: !Ref LookupTable
          BUCKET_NAME: !Ref BucketName
          BUCKET_REGION: !Ref BucketRegion
          CORS_ALLOWED_ORIGINS: !Ref AllowedCorsOrigins
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api/assets/{id}/integrity
            Method: GET


  ApplicationResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name:
        Fn::Sub: ApplicationInsights-SAM-${AWS::StackName}
      ResourceQuery:
        Type: CLOUDFORMATION_STACK_1_0
  ApplicationInsightsMonitoring:
    Type: AWS::ApplicationInsights::Application
    Properties:
      ResourceGroupName:
        Ref: ApplicationResourceGroup
      AutoConfigurationEnabled: 'true'
Outputs:
  LookupTableName:
    Description: DynamoDB table name used for image metadata
    Value: !Ref LookupTable
  RandomImageIndexName:
    Description: DynamoDB GSI for random active image queries
    Value: RandomImageIndex
  WebEndpoint:
    Description: HTTP API default endpoint URL with /api base path
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/api/"
  ProtectedReadDistributionId:
    Description: CloudFront distribution ID for the protected static site, API, and media entrypoint
    Value: !Ref ProtectedReadSiteDistribution
  ProtectedReadBaseUrl:
    Description: Base URL for the protected static frontend and media paths
    Value: !Sub https://${ProtectedReadSiteDistribution.DomainName}
  ProtectedReadApiBaseUrl:
    Description: Base URL the public frontend should use for read API requests
    Value: !Sub https://${ProtectedReadSiteDistribution.DomainName}/api
  ProtectedReadMediaBaseUrl:
    Description: Base URL the public frontend should use for image and thumbnail requests
    Value: !Sub https://${ProtectedReadSiteDistribution.DomainName}
# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    LoggingConfig:
      LogFormat: JSON
